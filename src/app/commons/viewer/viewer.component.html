<!-- viewer.component.html -->
<div class="viewer-container" #viewerContainer [class.dark]="darkMode">

  <!-- TOP TOOLBAR -->
  <div class="toolbar">

    <button (click)="prevPage()">◀</button>

    <span>
      Page {{pageNumber}} / {{totalPages}}
    </span>

    <button (click)="nextPage()">▶</button>

    <div class="divider"></div>

    <button (click)="zoomOut()">-</button>

    <span>{{ (zoom * 100) | number:'1.0-0' }}%</span>

    <button (click)="zoomIn()">+</button>

    <div class="divider"></div>

    <input
      type="number"
      min="1"
      [max]="totalPages"
      (change)="goToPage($event.target.valueAsNumber)"
      placeholder="Go to page"
    />

    <div class="divider"></div>

    <button (click)="toggleDarkMode()">🌙</button>

    <button (click)="fullscreen()">
      {{ isFullscreen ? '✕' : '⛶' }}
    </button>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- SIDEBAR (THUMBNAILS PLACEHOLDER) -->
    <app-thumbnail-sidebar
      [pdf]="pdfDocument"
      (pageSelect)="goToPage($event)"
    >
    </app-thumbnail-sidebar>

    <!-- PDF VIEW -->
    <div class="pdf-area">

        <div class="canvas-wrapper">

            <div class="pdf-scroll" #scrollContainer>
              <div class="pages">
                <div
                  class="page"
                  *ngFor="let page of pages"
                  [attr.data-page]="page"
                >
                  <canvas class="pdf-canvas"></canvas>
                  <canvas class="annotation-layer"></canvas>
                  <div class="textLayer"></div>
                </div>
              </div>
            </div>

            <div class="watermark">
                CONFIDENTIAL
            </div>

        </div>

    </div>

  </div>
</div>
