<div class="card-selection-container">
    <h2 class="title">{{title}}</h2>
    <p class="subtitle">{{description}}</p>
    <div class="card-grid">
      <div
        *ngFor="let item of items"
        class="group-card"
        [routerLink]="item.link"
      >
        <div class="card-item">
            <img [src]="item.image" class="card-item-image" *ngIf="item.image">
        </div>
        <div class="card-overlay">
          <h3 class="card-name">{{item.title}}</h3>
          <p *ngIf="item.desc" class="card-description"> {{item.desc | slice:0:length}} {{item.desc.length > length ? "..." : ""}}</p>
          <a [routerLink]="item.link" *ngIf="item.link" class="card-description">Learn More</a>
        </div>
      </div>
    </div>
</div>
