<!-- Main Content -->
<div class="d-flex align-items-start gap-3 mt-4 mx-2">
  <!-- add min-width: 0 in adtion to the flex to allow dynamic shrinking and growing-->
  @if (teachersTable && !teacherData) {
    <div [style.flex]="teacherData ? '0 0 30%' : '1'" style="min-width: 0;">
      <div class="d-md-flex justify-content-md-end">
        <button class="btn btn-outline-primary action-btn" type="submit" (click)="createTeacher()">
          Create Teacher
        </button>
      </div>
      <app-table
        [tableData]="teachersTable"
        (rowClicked)="onRowClick($event)"
        (actionClicked)="onActionClick($event)"
        [compact]="!!teacherData"
      ></app-table>
    </div>
  }

  @if (teacherData) {
    <div style="flex: 1 1 auto; min-width: 0;">
      <app-details-page
        [detailsData]="teacherData"
        [action]="action"
        (close)="onCloseDetail()"
        (save)="onSaveDetails($event)"
        (delete)="onDelete($event)"
      ></app-details-page>
    </div>
  }
</div>
